apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice
  namespace: istio-experiments
spec:
  template:
    spec:
      containers:
        - name: application
          env:
            - name: CHARACTERS_TO_APPEND_TO_MESSAGE
              value: " | by C"
            - name: OTHER_MICROSERVICE_ENDPOINT_TO_CALL
              value: ""
