apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice
spec:
  template:
    spec:
      containers:
        - name: application
          env:
            - name: CHARACTERS_TO_APPEND_TO_MESSAGE
              value: " | by B"
            - name: OTHER_MICROSERVICE_ENDPOINT_TO_CALL
              value: http://microservice-c.istio-experiments-no-mesh-application.svc.cluster.local/endpoint
