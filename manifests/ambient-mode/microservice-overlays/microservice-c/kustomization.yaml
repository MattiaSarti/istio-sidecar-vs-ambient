# overlays/staging/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../microservice-base

namespace: istio-experiments-ambient-mode-application

patches:
  - path: patch.yaml

labels:
  - includeSelectors: true
    pairs:
      microservice: c

nameSuffix: -c
