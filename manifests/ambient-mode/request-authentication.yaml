apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: jwt-validation-for-ingress-gateway
  namespace: istio-experiments-ambient-mode-application
spec:
  jwtRules:
    - audiences: ["istio-experiments"]
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "
      issuer: "https://kubernetes.istio-experiments-ambient-mode-application.svc.cluster.local"
      jwksUri: http://jwks-access-proxy.istio-experiments-ambient-mode-istio-system.svc.cluster.local/openid/v1/jwks
    - audiences: ["istio-experiments"]
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "
      issuer: "https://kubernetes.default.svc"
      jwksUri: http://jwks-access-proxy.istio-experiments-ambient-mode-istio-system.svc.cluster.local/openid/v1/jwks
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: microservices-ingress-gateway
