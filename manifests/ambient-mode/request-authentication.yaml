apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: jwt-validation-for-ingress-gateway
  namespace: istio-experiments-ambient-mode-application
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: microservices-ingress-gateway
  jwtRules:
    - audiences: ["istio-experiments"]
      issuer: "https://kubernetes.istio-experiments-ambient-mode-application.svc.cluster.local"
