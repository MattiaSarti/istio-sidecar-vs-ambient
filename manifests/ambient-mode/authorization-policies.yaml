apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-nothing-to-deny-by-default
  namespace: istio-experiments-ambient-mode-application
spec:
  action: ALLOW
  # implementing the deny-by-default behavior for all workloads unless other ALLOW policies are
  # defined for workloads of interest, as no rules means nothing is ever matched
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: from-any-with-headers-to-ingress-gateway
  namespace: istio-experiments-ambient-mode-application
spec:
  action: ALLOW
  rules:
  - when:
      - key: "request.headers[User-Agent]"
        values:
          - "a-very-handsome-client"
          - "another-very-handsome-client"
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: microservices-ingress-gateway
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: from-waypoiny-proxy-to-any
  namespace: istio-experiments-ambient-mode-application
spec:
  action: ALLOW
  rules:
  - from:
      - source:
          principals: ["cluster.local/ns/istio-experiments-ambient-mode-application/sa/fancy-waypoint-proxy"]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: microservices-from-any-to-a
  namespace: istio-experiments-ambient-mode-application
spec:
  action: ALLOW
  rules:
  - to:
      - operation:
          methods: ["GET"]
          paths: ["/endpoint"]
          ports: ["80"]
  targetRefs:
    - kind: Service
      name: microservice-a
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: microservices-from-a-to-b
  namespace: istio-experiments-ambient-mode-application
spec:
  action: ALLOW
  rules:
  - from:
      - source:
          namespaces: ["istio-experiments-ambient-mode-application"]
          principals: ["cluster.local/ns/istio-experiments-ambient-mode-application/sa/microservice-a"]
    to:
      - operation:
          methods: ["GET"]
          paths: ["/endpoint"]
          ports: ["80"]
  targetRefs:
    - kind: Service
      name: microservice-b
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: microservices-from-b-to-c
  namespace: istio-experiments-ambient-mode-application
spec:
  action: ALLOW
  rules:
  - from:
      - source:
          namespaces: ["istio-experiments-ambient-mode-application"]
          principals: ["cluster.local/ns/istio-experiments-ambient-mode-application/sa/microservice-b"]
    to:
      - operation:
          methods: ["GET"]
          paths: ["/endpoint"]
          ports: ["80"]
  targetRefs:
    - kind: Service
      name: microservice-c
