apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice
spec:
  template:
    spec:
      containers:
        - name: application
          env:
            - name: CHARACTERS_TO_APPEND_TO_MESSAGE
              value: " | by A"
            - name: FAIL_RANDOMLY
              value: "True"
            - name: OTHER_MICROSERVICE_ENDPOINT_TO_CALL
              value: http://microservice-b/endpoint
