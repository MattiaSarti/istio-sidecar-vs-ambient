apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: microservices
  namespace: istio-experiments-with-sidecar-mode
spec:
  hosts:
    - completely-made-up-url
  http:
    - match:
        - uri:
            prefix: /a
      rewrite:
        uri: /endpoint
      route:
        - destination:
            host: microservice-a
      timeout: 3s
    - match:
        - uri:
            prefix: /b
      rewrite:
        uri: /endpoint
      route:
        - destination:
            host: microservice-b
      timeout: 3s
    - match:
        - uri:
            prefix: /c
      rewrite:
        uri: /endpoint
      route:
        - destination:
            host: microservice-b
      timeout: 3s
  gateways:
    - microservices-ingress
