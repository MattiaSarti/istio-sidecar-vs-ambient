apiVersion: apps/v1
kind: Deployment
metadata:
  name: first
  labels:
    microservice: first
spec:
  replicas: 2
  selector:
    matchLabels:
      microservice: first
  template:
    metadata:
      labels:
        microservice: first
    spec:
      containers:
        - name: application
          image: python:3.12-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              cat << EOF > webserver.py
              from json import dumps
              from http.server import BaseHTTPRequestHandler, HTTPServer
              from urllib.parse import urlsplit, parse_qs

              CHARACTERS_TO_APPENDED_TO_MESSAGE = " | 🍄"
              ENDPOINT_PATH = "/endpoint"
              REQUEST_QUERY_PARAMETER = "message"
              RESPONSE_JSON_KEY = "processed-message"


              class HTTPRequestHandler(BaseHTTPRequestHandler):
                def do_GET(self):
                  query_parameters = parse_qs(urlsplit(self.path).query)
                  if urlsplit(self.path).path == ENDPOINT_PATH:
                    try:
                        message = query_parameters.get(REQUEST_QUERY_PARAMETER, [None])[0]
                        if message is None:
                            self.send_error(400, "Bad Request", f"Missing '{REQUEST_QUERY_PARAMETER}' query parameter")
                        processed_message = f"{message}{CHARACTERS_TO_APPENDED_TO_MESSAGE}"
                        self.send_response(200)
                        self.send_header("Content-type", "application/json")
                        self.end_headers()
                        self.wfile.write(dumps({RESPONSE_JSON_KEY: processed_message}, ensure_ascii=False).encode("utf-8"))                        
                    except Exception as exception:
                        self.send_error(500, "Internal Server Error", str(exception))
                  else:
                      self.send_error(404, "Not Found", f"Endpoint path does not exist")


              if __name__ == "__main__":
                HTTPServer(('', 8080), HTTPRequestHandler).serve_forever()
              EOF

              python3 webserver.py
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: first
spec:
  selector:
    microservice: first
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
